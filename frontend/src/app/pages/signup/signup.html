<div class="min-h-screen bg-[#FDFAF5] flex items-center justify-center px-6 relative overflow-hidden">

  <!-- Grain overlay -->
  <div class="fixed inset-0 pointer-events-none z-0 opacity-[0.025]"
    style="background-image:url('data:image/svg+xml,%3Csvg viewBox=%220 0 512 512%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noise%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.75%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noise)%22 opacity=%221%22/%3E%3C/svg%3E')">
  </div>

  <!-- Card -->
  <div class="relative z-10 w-full max-w-sm bg-white rounded-[20px] border border-black/[0.07]
              shadow-xl shadow-black/[0.06] px-8 py-10">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <a routerLink="/" href="/" class="flex items-center gap-2 cursor-pointer no-underline">
        <span class="text-xl">🍃</span>
        <span class="text-[22px] font-bold text-gray-900 tracking-tight hover:text-[#2D5A3D] transition-colors duration-200"
          style="font-family:'Cormorant Garamond',serif">FreeRecipe</span>
      </a>
    </div>

    <!-- Heading -->
    <h2 class="text-[36px] font-bold text-gray-900 leading-none tracking-tight text-center mb-1"
      style="font-family:'Cormorant Garamond',serif">
      Join for free.
    </h2>
    <p class="text-[14px] text-gray-400 text-center font-light mb-8">
      Create an account and start cooking today.
    </p>

    <!-- Form -->
    <form (ngSubmit)="signup()" class="space-y-4">

      <!-- Name -->
      <div class="flex gap-3">
        <div class="flex-1">
          <label class="block text-[12px] font-semibold text-gray-500 tracking-widest uppercase mb-2">
            First Name
          </label>
          <input type="text" [(ngModel)]="nameFirst" name="nameFirst" required placeholder="John" class="w-full px-4 py-3 rounded-xl border-[1.5px] border-black/10 bg-[#FDFAF5]
             text-gray-900 text-sm outline-none placeholder:text-gray-300
             focus:border-[#2D5A3D] focus:ring-4 focus:ring-[#2D5A3D]/10
             transition-all duration-200" />
        </div>
        <div class="flex-1">
          <label class="block text-[12px] font-semibold text-gray-500 tracking-widest uppercase mb-2">
            Last Name
          </label>
          <input type="text" [(ngModel)]="nameLast" name="nameLast" required placeholder="Doe" class="w-full px-4 py-3 rounded-xl border-[1.5px] border-black/10 bg-[#FDFAF5]
             text-gray-900 text-sm outline-none placeholder:text-gray-300
             focus:border-[#2D5A3D] focus:ring-4 focus:ring-[#2D5A3D]/10
             transition-all duration-200" />
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-[12px] font-semibold text-gray-500 tracking-widest uppercase mb-2">
          Email
        </label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="you@example.com" class="w-full px-4 py-3 rounded-xl border-[1.5px] border-black/10 bg-[#FDFAF5]
                 text-gray-900 text-sm outline-none placeholder:text-gray-300
                 focus:border-[#2D5A3D] focus:ring-4 focus:ring-[#2D5A3D]/10
                 transition-all duration-200" />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-[12px] font-semibold text-gray-500 tracking-widest uppercase mb-2">
          Password
        </label>
        <input type="password" [(ngModel)]="password" name="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border-[1.5px] border-black/10 bg-[#FDFAF5]
                 text-gray-900 text-sm outline-none placeholder:text-gray-300
                 focus:border-[#2D5A3D] focus:ring-4 focus:ring-[#2D5A3D]/10
                 transition-all duration-200" />
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-[12px] font-semibold text-gray-500 tracking-widest uppercase mb-2">
          Confirm Password
        </label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border-[1.5px] border-black/10 bg-[#FDFAF5]
                 text-gray-900 text-sm outline-none placeholder:text-gray-300
                 focus:border-[#2D5A3D] focus:ring-4 focus:ring-[#2D5A3D]/10
                 transition-all duration-200" />
      </div>

      <!-- Submit -->
      <button type="submit" class="w-full mt-2 py-3 rounded-full bg-[#2D5A3D] text-[#F5EDD8] text-sm font-semibold
               border-none cursor-pointer
               hover:bg-[#1e3f2a] hover:-translate-y-px hover:shadow-lg hover:shadow-[#2D5A3D]/25
               transition-all duration-200">
        Create Account
      </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-6">
      <div class="flex-1 h-px bg-black/[0.07]"></div>
      <span class="text-[11px] text-gray-400 font-medium tracking-widest uppercase">or</span>
      <div class="flex-1 h-px bg-black/[0.07]"></div>
    </div>

    <!-- Login CTA -->
    <p class="text-[13px] text-gray-400 text-center">
      Already have an account?
      <a routerLink="/login" href="/login" class="text-[#2D5A3D] font-semibold hover:underline ml-1 cursor-pointer">
        Log in →
      </a>
    </p>

  </div>

</div>
