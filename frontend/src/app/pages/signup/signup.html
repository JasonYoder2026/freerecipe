<div class="min-h-screen bg-gray-50 flex items-center justify-center px-6">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">

    <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">
      Create Account
    </h2>

    <form (ngSubmit)="signup()" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Email
        </label>

        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-400 focus:outline-none"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>

        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-400 focus:outline-none"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Confirm Password
        </label>

        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-400 focus:outline-none"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-orange-500 text-white py-2 rounded-lg font-semibold hover:bg-orange-600 transition"
      >
        Create Account
      </button>

    </form>

    <p class="text-sm text-gray-600 text-center mt-6">
      Already have an account?
      <a routerLink="/login" class="text-orange-500 font-semibold hover:underline">
        Login
      </a>
    </p>

  </div>

</div>
